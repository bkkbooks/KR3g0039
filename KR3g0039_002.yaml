body:
  text: 星命總括卷中遼耶律純撰一太陽一太陽者午為正宫星為正垣乃太陽為主也如房日大也虚日土也昴日金也皆有所屬乃日之次舍若正月酉時四月午時十月子時立命在午在正垣亦謂日居日分升殿也却不喜居於心危畢張則為日入月宫陰陽灰背偏生庶出之人也日為君出則有金水之佐金乃官星水為福元前引後從太陽不宜獨行無輔皆貧薄之人未申酉戌亥時生於他宫見太陽亦宜有輔皆可取也無輔皆貧薄之人也正月酉時生人太陽在子謂之移乾就濕二月申時生人主人疾厄木氣强者多主疾病五太陰五太陰者以未宫鬼度為太陰正垣乃午與未合日與月配也其次則心危畢張謂之偏垣為五太陰也月為身宫論生剋之妙者以月所泊詳其傍母傍鬼五星中以月最重若更立命為五太陰者尤為利害益甚身宫命宫度主両繫焉吉則両吉凶則両凶其可忽乎五太陰中以張月鹿為第一宫何則未與午合取日為逺張鄰為星取日為近午為一陰始生月喜居之次則危對星日心畢皆與日度相連月非日則無光也若命度張月加以近望夜生之人皆大富貴一生無憂夜生而在他宫立命月躔張者主一生安享命在張月在畢危心或四月度立命月亦在四月度者皆可起家發財成立也最喜金水孛月㑹金為金助月華㑹水為水涵蟾魄會孛為太乙抱蟾皆為貴格惟女人獨喜一金星伴月遇水孛近身皆無貞烈故日生喜太陽不可獨見夜生喜太陰却喜獨見中旬三更之月最為圓潔詩云殘星伴月落邊城月到中天分外明滿天諸宿皆沉沒惟有團圓月照人五更旦氣十分清斗落參横日未升相隨寳月上河漢惟有長庚伴月明丑寅時生人金月相隨皆文章明盛却不宜木為命度主也六木六木者尾室火度實寅亥之正欲見水孛則大𤼵其次有井木度者多于二十八宿木入木殿秦州度栁者減力大半次則斗二十三度次奎有十八度又角有十三度井以末二度隣於鬼合還太陰正垣斗以末度隣於牛合作丑土奎以末度隣於婁合作戌火角末鄰於亢合作辰金此四木惟角木弱况是金垣木必衰弱木在午行午限午為三河之地其地多風又為木入離宫化成灰多主夭折木在己已為巽風動又屬水能生木室尾二度見風稍輕深忌火羅火能焚木羅為奴犯主亥上立命限行火羅多死只喜水孛獨行或金入水鄉金水同行同度為上吉葢煞無餘氣木命得之多富貴金水加合有力皆為可喜如金月同宫亦謂之金助月華若是生於冬月及壬癸年更得天元月令助之為竒六土六土者虚牛為子丑正垣次則女氐為偏垣如女土近虚得子正位子為帝旺之地氐土近房亦居明堂出政之宮立命於此得火能發大福為官則至卿相非小小也惟胃土居酉土敗之地天盤又為反吟局人多不足若得火羅十分為上有木氣往來必然困厄至於牛金之土惟喜一火一羅獨行若限見火羅作黨則不吉也他土亦然謂之二母争權遇水孛同行土亦崩壞不可謂土剋水為財也最怕木氣當權得時破局入垣為大凶亦不可在四木度中謂之失次之土安身與火羅同度同宫者皆有福之人制化加合之妙又在善詳推之六水六水者翼觜雖火皆水正垣論度者以二宫見孛為水剋火不知水星行限怕逢孛為奴犯主也此二宫安命多易看葢己申忌土計其説多騐已之張翼軫申之畢觜參皆水也怕見土計其説可憑獨有井九度屬木人之論命毎輕忽㸔過次則辰有軫八度水亥有壁水寅有箕水壁于乾亥金混軫亦生于辰之金見土計稍輕惟箕水生于艮山蒙泉之地受質稍薄一見土計不破則夭故寅宫之水金星得地為大利主持之命惟喜金水同行或金水互垣亦好此宫深喜太陰與金同為金助月華深忌月與土計同宫為身傍鬼以行限而言卯辰巳三位不可有土無金行限次第逢之夘有土十五嵗中凶辰有土二十五歲前凶乃無中有曜若見金入水鄉水居金位皆是竒特二火二火者七政所躔各有四而火金不與何則尾寅室亥屬水而觜翼屬水矣火之所居不宜多有若火之多如水土木隨寓而有則火性炎而有焚燒之患故火之正垣惟夘戌二位戌為火庫夘與戌合夘火居房日之下以燧取火於日也戌火藏於婁金鼎鍋之下以金擊石乃有火也喜木氣為上躔在四木之度為吉四水度為凶孛與水行二位之火最怕水居亥子之地謂之水滿江湖火必㣲滅何則水在亥卯宫三合見之水在亥子宫加臨之戌上安命十五後見亥限有水破我相貎二十五後見子限有水破我福徳年少逢之多貧夭惟喜水木在天盤卯辰之間木在子不謂之木打寳瓶葢木在子命在戌亥宫二十五以後逢之皆吉此宫喜木月同行不喜水月同行學者宜詳之二金二金者金度有四而婁牛鬼各有所屬獨有亢為正垣曰龍者變化不測之物兵為凶器若動用不可度也次則酉宫金旺辰與酉合為金垣喜土計而畏火羅此二宫命土計近月不謂之土犯太陰為安身傍母乃富貴之人也辰上立命行限至午見火羅多死午為火旺之地又為金敗之鄉限行多凶惟酉金遇火為灾遇羅為有救葢酉反吟之局羅㬋在戌計在辰辰加戌羅在亥計在巳巳加亥羅㬋在子計都在午午加子天盤有救解也酉上安命却有土星在子為福甚大為官星為命母入垣逢旺加以禄主為天干月令有用之星行子限必大富貴如辰宫安命遇土於午稍弱於酉金矣金主不宜生於四火度中宜在四土度也丑宫命丑與子合故以土為主雖子相同然取用體局與子宫别子為四正丑為諸不入局三位互加以丑加亥亥中為閑極而宫通關以寅關丑命其星辰雖緩甚急亥為兄寅為相此宫有吉凶可以通斷外雖緩而實急胎中造化自有元㣲所忌者太陽木氣所喜者金火羅㬋正二月生太陽值難為凶多是夜生有力若秋冬両季雖晝生行太陽之道而福亦輕木氣為嫌但命晝生庶幾可取金為官星火為福主二皆可取晝生功淺夜生用多若火髙强明健雖晝生亦可發福如壬甲人見火如乙丁見金其福尤大獨羅有用氣計無成若混以刑囚值難當作凶斷若貴禄馬朝元局主之類稍吉此宫屬土中有斗牛二宿斗度命者當取木為用須甲乙生或納音木火命更以春令而生即以木論亦且不離乎土以此命度見孛故有功火亦得用惟晝生見金為忌若春冬之際生在晝時合得木用金以碍之又非宜矣若以庚辛生人或春夏之際夜生木盛金衰或秋冬以金主事則又不可以金剋木論葢庚辛人天元金也春夏之夜者金之廢也秋令者金之權也巳酉丑者本金局也三限皆金火夜生亦主金火合以金為長土次之火其用也何曾以木為本元若或戊巳生及納音土安命為斗雖春夏之火其用也即如土斷斗牛度四季不離乎土土者金之母二者不可離若夏令以火行權然亦怕火以土性存焉若秋冬得金獨垣茍無凶難功名又何疑此宫命者是官無禄馬多是三煞臨之辰戌丑未四位皆煞命妻官田總局若命丑身亥是身入鬼鄉如寅午戌生人此為三煞此格多凶害然諸宫皆以身入閑宫為喜惟此宫難與他比如身在亥有木臨照為禍尤甚縱無木氣亦不為吉通以凶斷以夘辰午為𦂳要之地午為難宫太陽居之為難星入廟若得火居之或三合見土為福星入局是八煞有星更以禄臨之少年功名可卜也辰為官禄金星入廟太陰居之身入官鄉如木氣臨之是木入水局土主不宜為害曜破官禄如失用更不可如木氣同太陰在酉辰是亥加酉午加辰辰午酉亥俱全皆為不足夘為福徳土星臨之是土入火垣有情生土或木星臨三合能破我福徳是夘加入丑為我命害少年刑夭十二宫命惟此宫乃緩中之急前所舉相貌閑極是若命主土星在寅亥者或有火羅合之多是卿相造化若土單行三方又為凶局若身與火交是安身傍母又如乙人禄夘安命丑者通加盤之夘在命為禄甲禄在寅甲人丑命為通關之禄入命壬禄在亥壬生人立命丑宫乃禄入閑極以丑加亥命得此三者為禄也如辛禄酉丙戊禄巳此三安命於丑合照有禄是合禄也正所謂隱中之顯是制局之體用合此者無不顯貴又不可不觀子寅若火寅金子為官福夾命夜生福尤重日月在二宫亦妙日在子月在寅為上日在寅月在子次之己酉両宫與此通斷當審吉凶又以丑之為命故知其與諸不入局於中又有𦂳要處若安命稍正則合從入局斷若安命偏於子又從四正矣偏中之正有天地合徳局六害局六合局又不可以諸不入局斷以六害為六合極相霄壤六合則始終有吉六害則始終有害按原本缺子宫寅宫命寅宫屬木獨陽不生木生在亥寅與亥合両宫互加丑為關通卯為加盤一則財帛二則相貎若有凶吉臨於卯丑吉則福為之基凶則為禍人但知拱夾為重不知互加為妙若在外而實在内也宫神艮丙生人卦氣以日木土為三限主木土為田財以金水為官福木土二星晝生明健福力非常夜生亦可金為忌害秋冬之際常行於夘辰巳之間是時木瘁而衰金强而怒晝見有灾如金㑹水日尤為可用若金獨行無水日以制之三合左右有太陰助金臨之木上禍何可堪金月本非晝用何况難星黨鬼又為身與鬼交此為慘毒若春夏之交金星行於西南東北晝生不利夜生金水同行亦為吉火同行為有情㑹合太陰亦不為凶葢夜從陰金火皆陰也若太陰更臨陰方又為吉用况其木盛金柔我强彼弱何足畏之水為官星晝夜有用此宫尾箕二宿在内尾乃火之垣寅午戌乃火之局其火之用明矣然而火乃木之子木乃火之母必先母而後子茍舍木而全取火是為有子而無其母寅尾命晝生以木為先夜生當以火為用金星禍福前斷已明水雖為忌亦有利害獨有丙丁人及納音火者可以為𦂳其他命者又不相同如箕度水四時取水為用水乃木之母先水而後木水之一星一為命母二為命度三為官星諸用畢偹若水孛交計水㑹水火交征水土相迫雖為凶忌尤當明審如春夏生水為休囚彼强我弱故是不足生於冬月水星旺相命主官星秉令凶惡夾之反為輔衛是猶武卒之於将相若居於髙强富貴可必苟失地亦不為凶古人云人命臨於箕多疾害兼箕好風且主簸揚身命忌曜交夾或星曜戰鬬於人多災病縱有官亦有讒謗之類人馬安命人多好動主遷移此宫禍福與亥不同亥以陰為主寅以陽為主論日木土三者故不離乎取用夜生用輕亦不可失辰為福徳已為官禄但木忌居福徳若月居之為身居鬼鄉遇水解之免凶辰與亥通關限入此者本宫有星可以明斷若無星必於亥宫取其禍福若亥有命母財元天馬之類皆以吉言凶星臨之則凶已為官禄一生成就之地己戌通關依上取用水為官星得失强弱生平賴之中間輕重前段已具午宫為遷移諸星臨之善惡易别六已生人太陰臨其上為大吉午乃六已人禄兼卦氣上盤巨蟹乃太陰之垣廟此命此格當為貴格又不可以難星斷之非六已人不可言未乃難宫此宫與他難星不同此是陰陽為難身主相干若身更入難宫中來加未未加午午申二宫忽有忌曜又為前後三日胎元此両宫為禍福最𦂳宜明察之惟丑乃財帛宫丑與寅通若此宫有田財二星或當用之星為吉與他處財帛命宫管攝者大不同葢此財帛有命宫也如甲之申子辰坐此是命有禄馬以木火為最重如甲之寅午戌則以木水為竒亦命宫之有真禄馬對沖也若巳酉丑人身居福徳乃身命夾三煞此宫所合數局本為不入局若偏之夘則有伏吟局天地通局在焉雖然如此亦難捉摸所貴者得其綱領而已卯宫命夘與戌合故為火命居於此為伏吟偏於寅則為不入局偏於辰則為六害局子外通夘四正取用最為𦂳切此宫體認與四正四刑返吟局相表裡如天地通局自夘起子夘為東方之地子為支神之首以此加之是為諸局之總故先有天地通局一則生二二則生三生生無窮宫神震艮人卦氣火金月為三限之主以木土為田財以太陽爲官主以水為忌難夘主陰夜生用火金月也金火有情於我處於髙明為福必矣晝生則用輕晝生若木土夾命度不為田財之用而為陽明之助火為本領與木相繼春夏當權雖晝生不為忌夜更有功一火滿用此為最切若在䧟宫則減力水為難星生春夏者以木火為主令我强彼弱水力終柔七月生值之者以難加值故是不足身近水為身與鬼交八月多主暗疾生冬月水常經於寅夘之間此時木衰火老水正得時見之不利若得水星合木木能生火乃絶而復續也若助之金其凶尤甚若金水交行是為難星得助此宫三宿如房度太陽性與火同類經云太陽與火通斷生尅制化惟依火而行心月度夜生從太陰為主金火助之吉見土計為忌葢夜生陰局命者亦以土計為嫌晝生從火斷如氐度戊巳生人及納音土者或命宫與土星相管攝方可以土斷又不可以土助之蓋天地土從火中出必有火而後有土以氐為土度斷則火出壯土但不可一例以木氣為嫌戊巳人納音土者九月十月方以木為碍終無傷人元氣若春夏之際又為財元生旺論之不可一槩言也庚人得之而為卦氣必能獲福又喜土計臨之葢天元屬金故夜生人亦不為忌此宫立命無分晝夜不問四時太陽必藉臨之吉地輔之吉曜守於禄宫卦氣之上則功名顯達茍䧟於惡弱混以刑囚值難必有凶累此必凶暴之徒毎犯刑憲此宫主命為伏吟之體難比三合六合論所𦂳者考於四正吉凶有無虚實則命宫同一體午為官禄子為田宅酉為妻俱相關係蓋子午卯酉本為四刑之地丙甲戊庚壬人之四刑者欄干貫索伏吟卷舌是也得其吉則有驟然之福歸之凶則有暴煞之禍命宫為始官禄次之妻宫為終畨復徃來凶吉倚伏其中交之際多是世變風移善惡相反也設若丙戊生人官宫主事此為天地盤中上下交刃若有福禄日月臨之多是發福終主夭暴如得子午上有羅計主之方可禦患蓋天凶制地煞此局機關最為靈騐福徳主已以已加巳上下無度只尋其初而窮其終與官禄體勢甚别或以軫加翼以其淺深不同禍福則易葢丙戊人禄所在若子午夘酉人破碎所在當斟酌而言此宫無四正變換之理合就戌中加之空關有吉可以吉斷有凶則以凶言通關無吉凶之曜當取三合有無制局解之方定禍福夘宫坐命體勢最難明白諸宫無變但㸔深淺如何最宜明白辰宫命辰與酉合金為主已在前夘在後人見其夾拱而相統攝夘本加辰辰加已両宫互加於此亥為通關反覆已亥両宫禍福最𦂳宫屬四庫既無禄馬又無卦氣命宫於此六害具體考之禍福反覆為先互加次之此宫立命以太陰為官禄主以火為田財晝生以土水木為三限主如晝之木土本强若更處髙明必合體用夜生則稍輕雖為反曜而亦無凶水之用淺得失難辨臨凶則凶遇吉則吉火星為財夜見為福晝見無功戊庚辛人多為不利甲已丁人見之為喜秋令則名利両全夏令則名為利奪行之陰道財福最多居之陽分人多貪吝如逢水孛則以為凶㑹土計為吉羅㬋泄財之氣木氣養之取用得失與其他宫分不同中有軫角亢三宿本同軫亦無異水在金中尚不為忌角之一宿木主乎春水土出于昏西沒為旦春月生人陰依陽用如甲乙為干納音屬木先忌金羅次嫌火氣其他干音又不同秋冬金強于木何有晝夜以金為首得其吉用為剛方若例以凶神恐乖仁義雖宫有三宿然主用要明不可一槩以戰為論蓋水之為用是金之子四時常行之道晝夜不忌乎土見土用為三限得土則金有滋生若角之為度是金中有木金柔則木盛金盛則木衰此二宫皆我本然之物何為刑戰但白晝以金木相交則恐為六害之悲當以凶斷其他時候如金木相去差殊何凶之有若角木茍以金為忌則亢金豈以火為財得失消詳又當明審此宫坐命生於冬月者金依太陽毎行東方艮震之地亦有躔尾箕於寅人皆以金騎人馬為忌此乃星家常論此宫與酉宫金騎人馬不同酉宫論者晝見為凶辰宫論夜生有禍晝夜造化已别明白更中間藴奥處乃𤣥中之𤣥也且以安命辰取上盤之夘于辰加寅於財帛夘第三宫閑極加丑在寅雖下盤是寅字而上盤却是丑字金得天之局故以為竒若戊庚人有禄馬貴人於是上盤之貴合下盤之禄馬此又為竒中之竒所以為吉中間體勢皆暗中造化又有亥為奴僕多為官星入䧟此又分别一般論亥雖奴僕與命相關此為弱中之强此宫立命與戍宫相等所貴者奴僕也葢戌中有己辰中有亥與其他安命之奴僕不同此宫體勢喜太陰與上同若太陰在奴僕若夘未有土合之即為妙用所妙者以下盤之亥為木局入上盤之戍為火局若得土合是火生土土生金身命相關最為大利故曰得天者貴得地者富午為福宫善惡相半得其吉用則曰培植失之於凶反成黨鬼未為官宫上有午下有未名曰六合為官惟此一宫立命有此格其他宫分無此得之者罕有如有一星得用在其間可以得名得禄若六已人太陰居未又為官星更司禄主星又得上盤之崇勲卦氣豈不為超倫出世之流酉中難宫辰與酉合彼此相同戌宫與八難相類如見難星只依晝夜生尅而論禍福金為命元又為難星不可以命宫與八難同論辰宫乃天涯地角之所合以驛馬臨以水孛多是離鄉奔走之人若交紫氣為僧道師巫之流也此宫體勢與四正不同與六合亦異偏之夘則曰伏吟偏之巳則為不入局輕重當自察之巳宫命巳宫屬水此宫安命謂之諸不入局亦謂之借局三位互加與夘未両宫相關係巳戌通關與戌宫為反復命宫加夘福徳加已以已關戌以戌通巳此宫取用為無體局多以借局用之借局者即制局之類也宫神屬巽辛人卦氣三限加之主則金水月以水為命元官禄主以太陰為福徳以木為田宅以金為財帛以火為難以土為忌水之所主四時不竭春夏之水為用淺秋冬之水則用多冬水秉令得之多謀術葢水者主智之義也水之於土實為忌害甲乙命猶庶幾壬癸人實為鬼土埋雙女見水氣不以為忌火起髙强見木氣亦為禍晝之見土不甚為凶夜生見火反凶為吉四季之土必有悲傷夏令之火為難太重土星犯月故以為凶火星犯月晝尤利害土為奴僕犯命臨身生來輕賤雖有基業之人亦如奴僕奔走火為疾厄居身入命生來多招殘疾雖有享用中年亦主殘傷金木為田財之主得晝用則義重利輕得夜用則義輕利重此宫二宿軫翼居之其間水火爭差陰陽迭異翼火度者水中之火火中之水亦猶五行丙子丙午得其制化為水火既濟冬令則火不能勝水夏令則水不能勝火黨之木則為火勢臨之金則助水性丙丁天干衆火則是壬癸命者取水為先若行火令臨以木氣是為助難五六月直難兼具若行水令㑹以金星為生官冬臘生人名利兼全此翼之一宿乃火之經復水之度火在中間以此謂之火度合以水性以主其本次以火星以求其用先取時令之強弱次騐人命之緩急但以水為用必無差火之為用當明輕重若行失勢是謂本輕末重主所往不利大扺水火衰旺之鄉尤宜詳審未可輕斷官福二宫在于申未此為要地如水與月同行為官福交㑹未甲通關官中有福福中有官若有一宫得吉前後俱利一星為凶彼此受災雖各宫分别而實相繼未宫亦與已相統攝申乃官宫巳乃命宫禍福徃來可以取騐申乃水垣吉臨為官局凶則破我官禄戌宫疾厄反復之宫也下盤乃寅午戌上盤乃申子辰失其用則為疾厄受刑得其用為通關有吉若火土臨之是火生土土尅我水也若三合在金水反成申子辰水局上盤加申與官宫相關係下盤是戌與巳相往來此宫極𦂳不可緩之最宜詳明午宫命午為離宫之地四正之宫四位通關夘加午午通酉子為對宫宫神離六巳人卦氣崇勲四正互加官禄為𦂳此午未𨽻於天故為日月子丑𨽻於地故為地土寅申巳亥乃四時運乎其間則為木火金水秉春夏秋冬之令午為君象此宫安命與他宫不同虚昴房不可以太陽為主惟星日馬為正度以日為主金水為官禄財帛以木為難又以日木土為三方主以四序而言晝以木土别其用夜以金星為權秋令得金官星秉令冬令得水財星旺夜不為凶晝金用淺以水土木為文經以金火為武略得水土木為人必賢良得金火羅計人多勇畧此宫取用與他宫分立命不同此宫神多以火羅計孛為無嫌葢太陽當空羣凶自伏此宫之諸曜用金水為官福日木土為三限主人命臨之木土金水用得其吉可為吉星之助得其凶即為凶星之忌如木星多不得用獨日主用為三限主如火羅計孛居子午人多以為嫌且以羅計中分五星是首尾相截之類人命得之豈可不為忌論而多有超達者何也午猶人君之位人君居位固親賢宰輔尤不可以無武將以衛之若人命有火羅計孛臨子午多是操略之人如體段稍大即為貴格更加善星臨巳午未申之宫凶星合命此乃吉星為助凶星為衛也如此必有制閫之權非小小守土官也申為福徳已為財帛二者往來吉凶相應人徒知己與申之類不知夘加午則寅加巳巳加申所以申巳二宫可以通關用若有吉臨則為我生福徳助我財帛或有凶破之又為寅刑巳巳刑申三刑六害之類也酉為官禄最為𦂳地在上盤則午加酉在反覆則午酉通關是命中有官官中有命二不可捨金星入垣多得於春夏之際白晝見之或㑹太陽氣象亦可中間却不喜金星失令而遇伏或得朝陽亦可言貴雖然為官終有讒謗金居田宅多居秋冬之際夜中見之更㑹太隂定主名利兼全秋金主富人多義氣剛方冬金主煞人必精強敢勇金生於已居官多主貪汙金絶於寅為官必主激駁若金水得經十分純美粹然亦可為富厚之命亥為疾厄是以木為難生於九月十月木星髙强臨官福命宫三合人多疾厄若臨於疾宫是為難星入難為災尤甚紫氣者木之餘同木取斷惟白晝見之雖忌亦可或臨於日月之中及福禄二宫中年多殘疾秋冬生金主令木終衰又不能為害或合處見生亦如是也若夜生太陰與木相值終不為竒更諸凶忌是身臨難終有患害有命居午金星入命太陰居官身入官宫官星入命當為公相又有命居午未月在申此乃寅刑巳巳刑申三刑俱動難主臨身安得不死於法此則眼前之善惡已自分眀更如太陰在戌加未日為命主入酉加午太陽得上盤之午太陰得上盤之未是日月尊强得春木敷榮秋金堅鋭交以凶神田財亦利若冬季生人水與土計合不可以概論蓋主神得令雖有凶忌而反輔衛居命臨官却有吉用水與金交是為官財得勝人有進身於仕宦者多溺於貪汚若水㑹木星或生於草茅者亦篤於文學水朝太陽為官主朝君少年科第水背太陽為官主退伏老無出身水臨月孛多貪酒色水近太陰多逢官貴水逢紫氣勤儉立身多主僧道水㑹計都多能計筭必熟商賈蓋水為性遇凶則凶遇吉則吉未宫命巨蟹屬太陰命主於此乃四墓之地禄馬不臨卦氣不在本與申宫相關坤為卦氣有無善惡與申相應凡安命於未為三合之體正則為三合偏則為四正又偏為不入局偏正稍異則取用不同所重者太陰乃身主也以火金月為之局主火為官星金為福徳太陽為財土為難星月與金火皆同功一體夜生用之火金㑹月在夜生為福最𦂳是為官福會身金星近月是為長庚伴月經云金星伴月常浴曉迎朔相逢事業宏此金月火體用最大蓋未屬陰以陰屬陰以陰類陰其用備矣或火金月會於白晝故為晝生夜陰裹陽然終為三限交聯特其用軟弱不可謂之凶忌太陽與金為田財主若白晝逢之為吉此又是金水輔陽土之為難遇在晝陰消陽長之時不甚為災得其吉助若夜生逢土計難必為災厄若得木氣制之猶為庶幾或以火羅助其禍必速人命見之不惟災厄傷生亦且壽年不久此宫三宿井之一宿二十餘度臨於秦此宫以亥夘未為木局而井度屬木故當以木神主之中間又不可全用木木星秉春月之令晝生合從木用不可言太陰也其他時即難以一體用之惟以太陰為主最𦂳太陰本夜生三方主也又以宫神主之以三分歸太陰為主更太陰歸陰方是太陰功用豈可分毫離太陰茍捨太陰而從木斷皆背陰反陽之義鬼金一宿與井相去已逺金為福主晝夜常在乎其間秋冬時節與金之旺者安可棄乎金栁土一宿與井鬼又差殊不以土為難不以火為忌羅孛得之者亦無患喜獨行輔於命此宫命者但是土星髙强則為忌若土星入命不足為凶蓋命宫以夘加未男女宫以亥加夘遷移宫以未加亥三合上下皆是木局土星臨之稍緩與三合見木氣亦是一般道理但恐夜在三合宫又有火合土反成木生火火生土其人不免於殘夭此三合為體而以三合取禍福通關反覆又其次也此三合者與亥宫坐命體勢稍同上下十二宫中皆為三合宫反覆與命宫相統攝亥中又有未善惡相關雖異而實同福徳在酉與財帛通關凶吉徃來當審之巳酉丑乃福徳之合金居其上是福徳星得局當有興發木星居三合之上則木入金局人命值之多主破敗雖有鎡基亦歸消散火星臨福徳之三合夜生則火有情晝生則破家福徳又不可以官星論蓋火入金局故也戌為官禄夜火顯用官髙名重晝火無光有官不顯夏令得時為官愈熾水孛合火多是驕恣以敗亡木氣合火多是清亷而見用戌之一宫與巳宫相反覆但恐戌中無星巳中有曜是暗中有害即不可救雖寅午戌合得局相輔是外助不能制内患忌子宫疾厄之為難土計臨子是難星入垣但是身臨鬼地者不可一槩言凶如子生人六戊生人六癸生人有太陰乃身命入在子宫是雖身入難鄉却是子生人歲駕戊生人卦氣癸生人崇勲此三者又不可以為忌但以大段土計相逼謂之身衰遇鬼依此斷禍福坦然也申宫命申乃水垣以水為先申屬坤乙癸生人卦氣水命得之為長生此命為諸不入局惟與未通關雖所屬與已相類然體用與已不同已宫以陰為三限古人云夜忌土星晝忌火若是三方猶較可此宫與他宫不同以木為官星以月為財帛以水為田宅以火為福徳以土為難在未者以土為重在申以土為輕葢己未二宫屬陰取土為真難申宫屬陽取土為三限中之一物是以不甚為忌生於晝者多以為得更如本命納音屬金命居申宫以土計為得其所養但夜生以土計為凶申之忌土計不如未巳二宫之水月為田財夜生得用生理厚實木火為官福晝則喜木夜則喜火若春令木強是官星乘勢雖為金制終不懼之得官必顯達夏令火炎是福星得地雖為水制亦不為失得此者福氣尤重此宫為局本水之長生地與絶處之水又不同土不能勝木不能泄遇金亦熾遇火亦熱四時不竭此宫四宿居之參者固與宫神相類畢雖太陰偏垣亦乃水之精觜火半度乃水中之火合從水主井之一宿屬木申子辰木星亦三限之主或甲乙人及納音木人皆可從木其餘干音皆可從水為主更以木得時則從木用立命於井者但晝生逢金為凶然亦不足為忌當春夏之月此時木盛火炎金神消爍若是金髙何懼之有若是秋冬金行東南井木固忌之然生於夜望人不為凶是金火無夜忌木土無晝凶之理此説明矣今有戊己庚辛命者在參畢為命度中間或得土為福葢晝生見之多發夜生遇之亦有小災其間須尋太陰所躔如何若太陰居陽分雖有土計亦無傷恐太陰居陰分則土計非我家三方主是相霄壤諸宫最切者戌亥子丑數宮自命而交相貌通關午酉又當取午宫之得失戌為福徳與已相表裏田宅福徳來徃實同戌為火局申為水局水臨戌一則失其本領二則破我福徳上盤巳酉丑金局固能生水是又傷下盤寅午戌之火若得木星合之水隨木化反凶為吉亥為官宫木居之為官主入垣火居之為變官為福乃官禄于亥以亥夘未為木局以官禄上盤午字却成寅午戌火局縱有金星破官禄亦不為破有一火則可制無火亦有火局可用蓋以木生火火尅金故也子為遊行上盤是未諸星臨之為得體以未宫太陰之垣也故不為身入鬼鄉是子之土又不能傷申之水有未字為天盤木局也丑乃土本傷水又以命宫之申加丑是為福主就鬼此乃申命加夘則八煞加申丑為八煞是下之土對上盤之申若有木氣在三合巳酉丑可制之於命宫三合申子辰猶為喜所以本宫體勢與巳不同也酉宫命酉宫坐命以反吟為體夘加酉酉加夘夘火來制金金受火制夘酉相對是為反吟此局有四破四正四破者火羅計孛居子午夘酉是也四正者如日月福禄居子午夘酉是也四正未分俱福四破未分俱禍當觀局之變處輕重如何此宫丁生人卦氣屬兊立命忌火羅喜土計用巳酉丑金局以土計居之為生我則得地明矣且以酉宫金主也金火月三限主也水日田財二主也木土官福主也火為鬼木為難如土星得用四季為吉得之則官高禄厚水日為田財白晝見之田財必厚木為福徳春令有情得之為利秋冬無情見之為一木両用善惡當分但以晝生終有情夜生終無用茍或九月十月之際為值難兼行加以水孛即為助虐惟火與金一則為主一則為鬼若巳酉丑金火月取則如何且金星乃命主也火賊也金之遇火則失勢然有得失存焉古人以金火月為三限主是以陰從陰之義也但火金二勢不可両立如春月金行西北此宫命者白晝見之是時金勢尚柔不能為患春金誠為忌火夏月金行午未間如晝生見之火秉權金必衰也若火金相刑戰有勝負則金果失時若火金相去逺隔三合無相干犯又可捨金星而從火用何也葢夏月生人以火秉令此一不可去也又金火月為三限主二不可去也限度望火反為祥望金反為禍至於秋月金臨辰巳之間如秋中見之其時金又司令火不能勝如秋冬生命臨金分此乃金主得時不貴亦富縱金不得地命亦安强冬月金行丑寅之左右時令凍冽木葉凋零金星主殺水星司令金水相依水强火伏金星又勝火金相合亦可無凶此宫三宿胃以土為經土為金母土星為官豈可不從土斷且木火亦時得時失亦宜以官主交參用之不可偏用昴宿雖曰太陽只從金用畢月一宿取太陰亦有憑據且以陰從陰金火月三限主也亦命度主也太陰為先金為次雖以月為主晝生亦貴乎金夜生不嫌乎火最忌諸宫之切亥子以至於寅戌加於辰亥加於己官禄於子四正往來若羊刃加刑中年多主反覆初主有變若四正無凶羊刃有吉曜臨之則為富貴癸夘癸酉子巳夘午己酉駕丁夘午丁酉駕此六命人者官禄為吉葢有崇勲卦氣在此四正為得也丑為遷移土為主以未加丑是未墓木制土太陰居之為吉地寅宫乃疾厄木居之為凶若更以火合木是火得寅午戌之局而犯疾厄其禍尤甚此宫取用與四正伏吟則異而大體有與之相關者可以類取也戌宫命戌以火主以六合為體六位互加一無奴僕二無疾厄以戌亥相關乃反覆之義夘為疾厄戌宫加夘子宫加巳此加盤之意夘之關繫尤輕巳之關繫尤重此宫無禄馬無卦氣先以反覆觀之以制為後諸宫以奴僕為輕惟辰戌二宫為重二宫之奴僕戌宫奴僕又重於辰宫奴僕也戌宫以日木土為三限以土為官主金月為田財星他宫立命身居田宅福輕此宫以太陰居未為真入格若太陰不在未但得居寅亦好是未加寅得上盤之田宅為次吉也金為財星居於酉則為財臨財若不得金在酉只得金居辰亦好是酉加辰也又是金垣亦謂財星臨財此乃無中有曜也木土日為三限或以晝生木土髙強木為火母土為官星依附太陽為官主朝君三星倘有得處或居强或無刑破皆貴格如夜生亦可用但不如晝之切水為忌居命則水泛白羊此乃萬古不變之論生於春者如白晝之際其時司令以水從木化雖凶亦輕其他時節雖不居四正之位但是命宫合之限度合之却為忌夏秋日見之火神為主安可有此非禍而何冬月火衰已甚水司令行東北中年限值之若無日制之其災更慘此宫二宿奎為天府圖書命居之多俊秀為官必居清要在革茅者亦老於文儒春令之木得水為喜遇金不怕雖宫主屬火然水隨木化火中得之終不為害秋冬之令不可取木捨火夏月火令雖奎度屬木終歸火性生尅制化從火斷之婁宿是火中金金中無位惟生於秋月金司令喜得土星生逢火不畏取金之義固長其餘月令通以火斷經曰水泛白羊躔婁最𦂳若是夏生不問婁奎皆以火斷且以本宫安命命中有夘對宫有酉夘酉戌辰為六合體至於官禄在丑田宅在未子午加之却為六害六合之命則多和合六害則䜛謗亥為相貌暗加辰字又與辰通辰戌對沖雖曰弱宫實有關涉于命子為福徳暗加己字己戌又通是福徳與奴僕有統攝丑為官禄以午加丑以火臨之則曰命主乘旺此最吉也或太陰居之則曰日中見斗是得中之失其間或有煞氣臨之如羊刃破碎之類尤甚若是金星居之為用星得地金入局也夘為疾厄命中有夘不可以此論戌比辰為尤重言命宫無疾厄也諸宫以八煞為難惟辰於酉戌命加夘不可以此論戌比辰為尤重巳為奴僕吉星臨之可以關命凶星破之亦能害命若水孛在巳皆為凶斷雖水獨行為土埋雙女即為凶格昔有一貴人辛巳八月初一日戌時生日月金水在巳人以為險其富貴不可曉不知己中有戌又為嵗駕以諸星關命此乃弱中之强其大貴宜也但戌上立命有吉星在巳更以歲駕卦氣臨之皆貴或凶星兼以他煞破之皆為窮困夭賤之人決無差失亥宫命亥以木為主此宫以合為體故滿盤上下皆三合局大概與未上同中間並無刑害四破之類亥夘未木局若得木星居之為木入木局得三合之正此宫與辰通關辰加亥亥加辰是巳亥二宫關疾厄之戌火為難彼此雖同而實異葢已之難火是我尅他亥之難金是他來尅我要審言之宫中屬乾壬甲人卦氣若命居於此有本年崇勲卦氣嵗駕殿與驛馬貴人又得木局主用為本然天理此宫以金火月為三限主以水火為田財木為官禄以金為難金火月為三限須夜生則吉晝生減力若火交金金交月則可為三限之用若金獨行又為難火月夜生最為用故為身主臨財又勝以水火為田財但獨行則宜夜用並行則宜晝用若夜中水火交行却是客星攻主木為官星木守命木居寅為命官入垣木居福徳遷移皆為吉用木入未得上盤亥字甚佳木臨八煞於辰或者金傷為碍不知八煞辰宫有金則忌辰若無金則是申子辰為水局是水生木為吉只木入酉與太陰居酉此為身命入鬼鄉不可以身居閑極論此宫是無閑極葢以酉金尅木也金在木左右若春月見之則不甚害乃春木盛而金柔不足畏也夏月金星背馳於西南乃夜中見之火盛金衰金不犯分更以夜生為三限主是金星不能傷我惟秋金主煞每行東南冬金行東北此二季以金忌若是白晝見之或金合度或木前金後皆為害曜可忌也夜見之主殘疾甚而夭若有水火以濟之猶庻幾或見土計助之為毒尤甚此宫二宿室宿乃亥之正度雖曰火終是木宫之火必有木而後有火木既失躔火從何出四時之中不離乎木雖夏火司令亦不棄木為主也水入室宿一則田星入命二則母星入命木得所生火則有恃若白晝木火並行只從木論夜中取用亦然火亦度主木為財元又為三限主也壁乃水為度主水能生木雖遇土亦何畏以亥夘未為木局也與其他處立命土星躔壁取用又差此宫雖土不入命但居於強猶不為碍若土居别處三合與難星同一斷也金居福徳雖曰土垣實為金局蓋上盤已下盤丑即金庫也身主臨之難為福徳木星到丑亦為木入金局有水化金即為得用若土星合木巳酉丑為土生金勢鬼暗受生木又失地不可以木尅土而論寅為官禄乃自家之地木臨三合為官星得地如火入三合反為財局蓋下盤寅合上盤午是寅午戌火局木星晝見居强又為官禄之造化貴格明矣若夜得火强為財局造化却主富木星得局失於戰尅亦有官但多讒謗火星全局失於戰尅亦有財特多耗散蓋三合局面諸宫皆合官宫財宫乃寅午戌全局得三局已成不為他破可以富貴却以金為疾厄雖曰金鄉喜成水局得金生水水生木為吉但恐金星強在他宫則當以制局斷矣
