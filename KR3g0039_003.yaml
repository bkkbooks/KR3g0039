body:
  text: 星命總括卷下遼耶律純撰髙麗國師賦元星入局富貴無虧母曜歸巢榮華可准若見財星得所發積成家倘或制鬼當先刑傷破耗母曜莫傷於財曜財星莫制於母星母入財鄉清淡守株之士財居子位慳貪薄藝之人子衝煞地是英雄子若衝財家破耗子居母腹必多蹭蹬之才煞守元方定是孤寒之士大抵母曜無傷元須得地夀入夀而無虧年過一百財遇財而有制􅌩乏分文母徤子明而男女成行財破元虧而夫妻反目元局破而猶可元星虧而立凶泄氣重逢貧無立錐之地閒神疊見身無一日之安戰煞必要其降煞戰必須他弱星運一元氣分萬象元星貴乎生旺官星切忌休囚當明官鬼之元一星二用必達母財之理二曜一情財破庫傷終身危蹇元衰財弱一世貧寒鬼旺則夀算必虧子生則田宅有發元坐孤虛骨肉參商却宜僧道令居馹馬功名蹭蹬偏喜醫巫逢生則皆致祥遇絶則能成禍官虧印不虧必作青雲之客令母有情當為黄甲中人煞盛元虧則早年夭折令傷母損則中歲孤貧鬼入元方利名無就元居母局官爵顯榮財庫不生而不絶亦可守成令元不旺而不虧僅能承䕃白手成家必是令生財宿青雲得志當知令䕶元辰煞化為官多是險中僥倖令變為鬼必於閒處榮華妻星弱而重害室家母曜䧟而六親早尅滿門昌盛皆因格局安和一世孤寒決是令元臨戰官令逢傷縱得名而不過虛譽鬼閑大盛雖有權而終無實名貴煞禄勲得用則星純可取官庫歲駕不傷則曜㑹為佳切忌無情拱夾須㸔有意揖朝不可一途而取要明三昧之元大抵閑神不可交迎制忌亦嫌拒敵尅我者有用何妨生我者凶神何用空亡絶地㑹吉非祥禄馬旺鄉逢凶反福元居亡刼有鬬多災母坐煞宫無故多滯生旺處為福還堅死絶處有福還淺蓋五行順則為祥逆而必禍也星辰元妙論凡水火土木皆能自生自旺惟金得火而後有用無星輔皆主不好蓋謂天地肅殺之氣揫斂萬物秉權則生意斬然上帝好生抑之不令肅殺之氣盛所以廢之時多四星有餘獨金無餘以此凡土䧟山崩枯枝敗葉長江浩蕩爛斧繡針爝火大明吉凶救解最須詳辨土星最忌落空亡升殿入垣而落空謂之土䧟山崩亦主退敗可畏如有惡星降夾逼迫多有氣蹙噎吃之疾惡星降夾多主倒限如火㑹謂之填凹補缺金㑹謂之山川呈寳皆主名利發達木星落空謂之柳枝落根如金㑹則斵削成材火㑹則焚折灰滅水㑹則漂槎泛筏不免漂蕩水星落空謂之長江浩蕩退敗無餘㑹金則洪水漂蕩滔天無物常有不測之災金星落空謂之爛斧繡針煅煉又好貴人星㑹之則是常行用之物又主名利有成火星落空乃離中火虛謂之爝火大明反主發達夜生尤妙蓋火遇夜則明故也如前件落空者皆是升殿入垣而有此格禍福即旬中空是也如丙辰生土為福在女度行限甲寅旬子丑亦主退財坐地受災能說不能行如戊申生人土禄在卯甲辰旬無寅卯行限反主奔波勞碌不利財榖所以星落空者切不可以福禄及升垣殿以為吉四時五星論春月生人命限連有土孛金水太隂羅計謂之雲雨不解淋漓花果觸目愁景主退敗可畏四五月雖然得雨然亦不可連接行限見前項星辰為乆霖不晴皆主冷退愁悶生意蕭然如有此格日火行限謂之乆雨逢晴伸眉舒目人物欣快必主驟然大發秋月生人連有風雨星行限主霖雨傷稼冬月生人連有此謂雨雪載塗皆非好格冷落寂寞不言可知所以晴雨之星要有相間行限得晴雨停勻生意順快凡孛氣計羅㑹土皆謂黑雲暗日主夭貧人命五六月生火日行限却在巳午謂之旱魃南離生意焦枯如逰年孛土羅計到晦掩其光反主一發過了逰年又主禍依然是以行雨限俱是火日亦曰乆晴不雨萬物爍落如忽行一星如羅計孛金水太隂氣星則雲興雨降物苖勃然發達可知凡行風雨星而逢日在戌或行限在戌三合對照則雲收雨過落照餘暉遇此格者主晚年發達凡太陽坐命極主勞碌不閒一生慷慨蓋日運行不息故也冬月水羅㑹謂之和風解凍寒林生春火㑹土謂之寒谷回春皆主𤼵越春來宜火日怕羅計如㑹日可謂蒸烘日火則春入園林粧綴紅紫羅計到風僝雨僽反主貧夭秋天水居水宿見金謂之寒潭浸月太寒未免清秀而貧薄氣㑹月在前謂慶雲捧月在後謂浮雲蔽月化凶不妨凡氣入申為入猴山不過作事混沌凡木氣為禍不過冷淡是非留連不寜所以木星為禍遲滯淹延不安氣木為人執拗不惺鬆凡殺㸔不展水泛揚州損自已之財命逢氣吉取他人之財為自已之用為縁水計相逢凡行水宿水宫㑹土於寅夘上決主見災無妨不倒金水㑹子巳午宫上火尅金於亥子木尅土於申酉水尅火於辰戌丑未皆主重灾見事限度無害凡金為天地肅殺之星是以行金星限未有無刑尅孝服化吉亦然春天土木相㑹行土限驟發名權而死則難免凡疾奴兄財妻兒等宫仍兼其宫度主論之極騐太隂變段玉華星子天心月到十分明喜在危宿度上臨男必公侯女妃后夜生人享福尤深男女皆貴天封星丑月躔斗宿號天封赫奕聲名學問通君子逢之須得禄小人逢此定西東文章冠世陽明星寅陽明寅上曉星臨日出扶桑溺太隂遇夜生人尤減福晝生勞漉乏資金按此下原本有闕文天車星夘桂華心主影扶疎對照那堪畢月烏若遇夜生官爵顯十年榮貴到中書好逺行得衣禄天開星辰星躔角亢月無光對望宫中怕太陽火土計羅臨照視英雄難保少年郎女主孤天瑞星巳月如到軫是髙强一生清厚有柔剛身命限中俱見照龍池鳯闕佐君王榮貴天曹星午月躔張宿號天曹才力經營志氣髙形貌端方榮貴早秉鈞當軸禄堅牢躔栁亦好玉魄星未井鬼宫中月喜躔未中玉魄夀延長女人邑號身榮貴四正宫逢禄位遷太隂木宫玉宫星申宫属隂陽遇太隂不宜觜宿只宜參參是水猿猿嘯月一生才學貴人欽文章貴顯天印星酉太隂酉上為天印畢度之中貴先並那堪金木又同行金榜題名官一品月到金牛天垣星戌月躔婁宿號天垣廟旺之中福禄全君子遷官居禄位小人衣食旺庄田婁宿月廟天鸞星亥月躔室宿號天鸞形貌清竒富貴全更得木星同位度直須奏對近天顔榮貴太隂倒限子上危月度立命限行至夘尾一二度本宫對合皆無星有忽然死者皆日月晦明不同危月也至夘日出之所正入陽剛之地是為有他無我兼以太陽惡弱倒限無疑又如午上日星度立命限至酉畢度本宫無星而忽然死者盖星為日日至酉酉為月出之地亦有他無我兼太隂惡弱倒限無疑剛星帶戰剛星穿戰實難當田命逢之怕受傷化惡化讎年夀促散財散福見閻王剛星為夀主命當生過剛星於𦂳闗内或望合相穿正照皆非吉兆儻得柔星為命田之主或帶奪受二星之尅限數還元假饒化吉穿戰受制得志之時速死之事難免讎星奪煞木星帶煞命難延五福之中夀不堅若使氣星同到限玉皇來詔掌天仙氣木雖善奈為讎星二星不宜㑹光景之内木星又帶煞是為懦惡二星相遇於三十度内忌計孛金羅於中間間斷至於㑹合相遇必登無常之録矣論惡星甲庚生人不用火火星在戌為殃禍乙辛生人不用金金星辰上化為塵丙丁生人不用木木徳在寅多反覆丁壬生人不用水水星在巳無依倚戊巳生人不用土土星在子多愚魯朔日太陽居於午十五太隂居於未身命運限若相逢如此之人為正忌二百字真經四正宫神暗加管攝四正者舉一而四者相貫穿也如子午卯酉寅申巳亥辰戌丑未是也人多以三合論而不知四正生尅為急如木在子卯酉有金暗受傷尅如水在申巳亥有土亦暗受傷尅如金在丑辰戌有火亦然餘倣推之可知根本之強弱矣天元得地有用者昌天元者甲乙年木是也為科甲星又為命主官禄福權之星居髙強得水為助必富貴如受傷害必貧困矣月令當權乘氣之旺月令者寅卯月木是也如春以木為令又以為身命主及官魁福禄之類乘旺得水助之為富貴之命正垣氣旺傍我無權正垣者七政各居十二宫為正垣吾嘗謂言宫不知度言度不知宫人多不知此處元妙如土垣在子子謂正垣之所危之近虛濱土之水淺水之土皆近岸虛土自危一至危五皆土也次則斗二十一起合連土度辰宫角十一十二合為亢午張一至三度合為星未井二十九三十合還鬼戌奎十七十八合還婁此皆歴騐非臆度也界限分明彼木此火此八字以寅卯界限之説言之葢尾三度屬卯火為主餘度寅以木為主若以寅尾為火則誤矣主居退留餘曜難救觀星以遲留順逆為最急主星尤闗利害入順度則平生作事順快有福如入退留一生作事進寸退尺兼為人不剛果流於慈懦者有矣宜詳之母居退留為福不力生我者為母如入退留則是欲生我而不力也母星無生何暇顧子如以火為主羅為奴星木為母星若木不生火反生餘奴之羅或乙生人又為刑囚是我父母有用之氣反黨餘奴刑囚之輩何暇顧我生我而為福哉母尅於用福力潛消如土為主火為母若火不來生土却與金同行則所恃之母氣反與金相戰縦有力以及土子亦少減矣敵強難攻用力有損命書云相刑相戰則處世多迍相順相和則終身安静人多以我尅者為財言之則謬者多矣若以金為主限見木氣木為主限見土計之類二星作黨者強敵也見之重則刑囚輕則貧病必然之理也兩母争強姑息太過如土為主限見火或羅則發福如火羅同㑹若吉而實凶蓋母與餘奴方争權未息縱能愛子亦無力矣太陽當空羣曜潛伏太陽者君也如七八月巳午時生安命在卯如躔房宿火為主將後行己午限見日或如金水木土與同宫為科名科甲官魁福禄遇太陽必伏諸星必無光也月兎無光晦朔倚日人命生於晦朔命在月度此時月與日同㑹若日月前後有吉星必吉凶星必凶設若日近火羅土計者凶日近金水木者吉也河漢艮坤為士必秀河漢者天文也秀士者人文也河漢始于丑寅尾于未申如人命在此宫者必為秀士文人次則戌奎亦然煞尅餘奴本主自旺如人行險阻而遇賊必先將奴僕殺傷而本主得免也如木為主金為煞金不尅木而與氣同行是與氣相敵而力不及木矣故本主得之自壯也餘奴犯主縱吉為凶如木為主氣為奴木出與氣同非享福發財之命甚則早夭以年當煞十常八九限遇煞奴十難一免如木為主金為煞氣為奴限行見金之煞又遇氣奴三合若無水火救之十中難免一也一云如金見火為煞限行不見火見羅為煞之奴星亦不免也母無餘氣藉木觧仇此言己申與箕壁之水宿以金為母金無餘氣得木氣居于強宫以尅制土計之仇謂之子能敵鬼與母力同煞無餘氣逢火灰燼此言木為主星金為煞而無餘氣若行火羅亦能焚燒山林毒於金氣也正煞暗煞轉禍為福正者正盤暗者加盤天機禍福多在加盤如子上立命以土為主行限寅見木為煞如是暗盤巳上有火在焉木生火火生土為暗救有方又如戌上立命奎度行子限見金如巳上有水暗中有救必能轉禍為福正生暗煞化吉成凶如子上立命土為主行限寅見火而生若巳上有水孛傷火乃暗中受陽也朔望食神隂陽非利日食朔月食望如日正食之時而人生又在四日度日既食而無光此命豈能有福如望夜失明之時而人生在月度中立命亦然界限中安離家遷祖所謂界限者天文本無界限而人有之如軫十氐二之類立命于此者多出祖過房否則不住祖屋遷移不定若主星多在過宫上亦主不安也上盤下局如合參商命書所謂天宫地位十二神消息其中一㸔行度則于加合之中宜細推詳有加著加不著宜觀太陽過度二盤尅合子午卯酉之正各于上下二盤冩一星然後以一星加合則天宫地位十二神上盤下局之星加合瞭然可見生我尅我在與不在合與不合宜詳之釣合衝臨分擘濶狹此即同宫千里異宫尺寸之説所謂釣合者申子辰之類衝臨者子午卯酉對衝之類如立命在子火在午吉木在午凶萬一命在女四五之間木在張十二三之間照命度不及又豈能為災若木在柳七八度正照則為禍必矣餘星濶狹亦宜分别言之洞元經人生有命數係乎天天以日為紀綱命以日為分度顧識諸宫屬度之彼此當觀太陽入度之淺深日在角初度雖田宅却歸男女日在角初度子時生人未上井十八度安命軫十度過辰至角初度始為得辰上九度以十五度為中言之田宅宫辰巳之間男女却在辰卯之間故曰度躔田宅却歸男女本官禄而且在遷移太陽在寅宫尾九度午時生人亥上室三度安命寅上本是官禄宫葢命宫止占亥上六度官禄在寅卯之間官祿宫主本在寅上而侵在卯上遷移宫之度矣葢異一日則有一日之差屬一宫則占一宫之宿葢異一日則太陽行度又差一度矣宫分淺深又差一度宫分淺深由此而權後學短淺分辰布星認子丑為藩籬指燕宋為疆界遂使星躔室一謂虛䑕之同宫命在虛三言翼蛇之對望不知星之光耀只及十五度日之前後因分十二宫剖畫既差所用難據今之言命者但以子丑為界隔全不考入宫度淺深葢星辰之光耀前後各照十五度且如照命在亥室一度中間自隔了危宿十六度矣則虛宿在十五度之外如同不相識者豈可謂虚䑕之同宫在虛三度自星二度相對豈可謂翼蛇之對望談星者不可不察矣原夫東出為命西没為妻地下為田天心為禄觸類而長餘宫以分所貴星見而不没方得限逢而有用此言天盤上四正宫也天盤之卯即是命宫酉妻子田午官之義如何謂東出為命西沒為妻人之行限如太陽之行一日至午時則太陽正中光耀爍盛如士君子三十而從仕也至於酉則日之西沒如君子老而致仕也田宅宫則一生營産作業不在此限也入地六宫埋沒有也如無當天一路照臨貴而且富天盤自卯至申謂之當天一路自酉至寅謂之入地六宫若星辰但在當天一路則為有用主早年發仕宦若陷在地下六宫則為無用其間富或有之則不能顯達矣究田宅專憑禄位論富貴須在財官官禄為有力之鄉言貴更推於命疾雖主疾亦是貴人之威權妻不專妻葢闗自已之禍福疾厄宫前輩謂之威權宫貴人得之則為權最大經云疾厄宫中多惡弱莫信村師胡泥著此宫還與禄宫同命主臨之膺顯爵妻宫非特專論妻妾亦財也此宫之主釣起之髙強陷弱及飛來之星有吉有凶自已之貧富係焉官禄宫有吉星固為有力又要命宫有吉曜相副則可以貴人命斷故知命者當知次第用斷吉凶根本最在命宫鎡基又㸔合處命中有吉星固當作吉命又須三合上有吉星乃貴命之論也人命只為大綱諸宫各主其源身曜雖分當論福宫太隂之一月如人之一世月之初生以至弦望晦蝕則人之少壯而老身主實為切要一生無享用皆以福宫論之一事所喜者剛柔之相等所惡者氣數之不純凡㸔命者於命宫先得大體諸宫分各主一事當㸔其吉凶而許之所許者剛柔之相等所惡者吉凶之混襍也是以宫配隂陽星分尅制水火若同而知其灾金木相戰而惡其傷此則前所謂剛柔相等氣數不純謂宫配隂陽星分尅制因此意也相生和同則吉相刑相戰則凶水與火金與木皆相戰尅勿謂非災害也惟晝之土木堅牢而夜之金火煥發此言晝夜清濁之妙土日木陽曜也日生宜之金水月火隂曜也夜生宜之晝生見土木日陽曜則根基堅牢夜生見火金月則前程顯達生乎晝者欲其情厚生乎夜者欲其曜明水月計孛智巧而性靈土日炁木情和而性静土持重而有福火奮發而有權是以非火不將非土不台土星持重鎮静得之者其福祿厚火星奮發而猛勇得之者主有威權若非火星則不足以成大將軍之威武若非土星則不足以為三台鈞相之權福也水流蕩而順情木清孤而好善於是非水不妓非木不儒水星流蕩朝雲暮雨不知正則是以非水不妓木星敏慧飲水食露嘲風詠月為理所縛不敢妄為是以非木不能為儒金計乃軍戎之流水日乃伎能之士計本凶得令則有殺伐之性此必邊鄙軍戎之輩水日乃智巧多能之人必技藝之士夜土逆而見日蹇滯功名日火伏而逢陽奔波衣食紫木為人之華葢金孛乃天之咸池命遇紫木乃人之華葢遇凶不凶金孛乃天之咸池淫蕩之星二星多主為人好色淫蕩得地為福者其氣純得煞為權者其根厚身度以居閑為福莫主遷移福德以見木為良豈堪月孛人之一身乃安静和平為福太隂若躔閑極一生可享安閑太隂若在遷移居止不定不可言福福德一宫之中惟是氣木等之吉星則有享用若見火孛乃自作不静之宿無福之論水月而多清貴金土而定富豪水星伴月名望俊雅多清貴之人也土能生金財寳豐阜定知是豪富之命也善星在命兮無奈發遲暗曜攅身兮須防早夭善星者金木水氣之類也人命遇之固吉除是發達無有不應暗曜者火羅計孛之類也此星攅聚于命忌夭折也壽齡者天乙紫氣文星者木德歲星水火併於四宫破家蕩業木日㑹于二位發禄旺財水火刑戰於田宅宫中破家必矣木日㑹于財帛之上富厚可知也金羅㑹兮虎閫制兵水木交兮蘭臺掌翰金羅本是凶曜貴人得之則有閫帥主兵之權水木寔為文星文人得之則有西掖掌翰之貴五星都聚不如一曜專權本主既空豈宜三合又暗五星混處一宫不如一曜獨照之明快命宫無星不宜三合上有暗也子孫忌孛妻妾宜金日須出晦以登天月要向望而臨夜晦者月窮之日也太陽須在旦以前在天盤上自卯至申六宫謂之登天望者月圓之日也太隂要在上弦後向望而夜生也木羅有科甲之譽土孛主獄訟之灾現成福䕃者日月雙逢奮權自立者羅計獨照福之力不減於官宫貌雖弱猶勝於奴僕福德一宫乃平生受用之所係較之官禄宫比量輕重無甚損減相貌雖是陷弱較之奴僕宫此為稍勝者也火為夫金為妻日為父月為母僧流道族多因身命居閑任子䕃官定是福田得力田宅宫謂之祖䕃宫福德宫明徤當受現成福䕃世賞之官非是親擢科第乃受祖父之澤而享現成福䕃人也凶之為凶者火孛晝逢忌而又忌者土計夜見晝忌火一凶也火而逆孛凶而又凶也夜忌土一忌也土而逢計忌而又忌也大富極貴非權煞以難榮孤害無情乃吉星之太弱非煞不足以為權大富極貴非權煞不足以致榮顯金木等星失之太弱必招清孤尅害無情冷淡之客也火土而眉目大朗羅亦如之金水則容貎端嚴孛還稱是偏房庶出者身多入陷安意遂志者星盡順行二曜􅑮交居相貌而損目五星正分入命宫而封侯二曜者日月也交者羅計也日月主人之眼目若遇羅計必主損目日左目月右目五星入垣局正臨命宫分度者則主封侯建節也富者無貴人之清貴者無富人之厚清貴濁富乃世之常談葢貴人多帶清氣所以無富人之厚者土羅計孛之謂也富人多帶濁氣所以無貴人之清者金水木氣之謂也身命併而禍福𦂳德官空而力量輕紫木入限最利鄉胥孛計併來多招外撓禄居禄位福最厚煞入煞宫權更隆命嫌互換逢傷星要髙強不陷釣起飛來謂之互換假如火為宫主飛入水宫水星飛入土宫謂之互換逢傷命主要入七煞強宫不陷弱也伏者猶同暗曜留星便是空亡星行伏假如臣侍伏於君之側光芒隱伏同於暗曜星留住不行善惡不管與空亡同也羅孛忌旺而臺職諫臣火土髙強而藩方帥府夜厭柔星之用事晝嫌強曜之聚妖驅使奴流身陷而帶孛贈封國號火順而照西奴流者身居陷弱又帶孛星奴僕命也火宜西流者火順行于未申之次封贈國號之貴也夜厭柔星之用事金水木氣也強曜者火土羅計孛也惟天機妙斷一家謂日剛星也喜木氣金水柔星以為吉輔也月柔星也要火土羅計孛曜以為之輔五星則不然夜生見金火月等曜晝生見日木土等曜謂之晝夜清濁經云女人切忌男人曜日裏須防夜裏星此言夜厭柔星晝嫌強曜正與天機妙斷同也二交兄弟無雙兩曜妻兒較晚二交者乃羅計也若在兄弟宫即難兄弟若在妻子宫主妻子遲科甲科名渾成浪語官星財曜盡是虛傳但秀發者能文章重濁者多財禄實而遇濁者第富而必鈍清而遇寒者雖貴而必貧此論貴清富濁之造化科甲科名官星財曜皆不足憑但得水木秀發之星能文章得土孛重厚多財禄實而遇濁謂土孛之見計者富而必鈍得水木更遇氣者恐清而多主貧寒者也善莫善木星惡莫惡計曜禍自禍福自福難用折除吉不吉凶不凶是為庸泛火未來而災先應孛雖去尚有餘殃坐計孛者早歲多迍逢隂土者晚年最忌入限不如入命同宿猶勝同宫金在七宫妻妾多主美貌月居八煞身體必有廢疾六宫卑濫五位文明以善星興者終始安榮以惡星旺者聲名歇滅善星欲其有用惡曜嫌其無名禄元獨照問福不問災忌曜雙臨問災不問福木淳火燥土厚金強日和月朗而氣好髙羅斷計謀而孛尚勇惟水以一言蔽之曰通若其木傷於清而寒火傷於猛而烈金之剛土之晦日之獨月之孤孛媚水淫羅暴計險當自於心胸而有斷實難以言語而授人或一水能妨盡氣數或一火能喚起精神晝之光烈未必為權夜之隂凝無非蹇滯美貌脩容者金水對照尅親破祖者火日同行平生則得一星用之不盡羣曜不照惡弱此亦難逢髙強處處有星方為貴格臨照星星廟旺便是福人氣逢日月非道即僧土孛㑹羅不富則貴磨蝎得一星而浙人應𦂳雙女得一曜而荆地騐多磨蝎得一星以分野言之在丑地吳分乃兩浙也所以浙人應𦂳雙女已位乃荆楚之分即荆湖也所以荆楚之地騐也水近計而慳吝木見孛而夀延奎乃文章之宿柳為賊盜之星牛重參清危淫尾燥坐翼者多揖遜從容之士得井者乃親宻侍從之臣諸星皆不旺則氣斷甚庸五星雖不聚而氣全亦貴五星皆不聚者謂滿柈無一星廟旺則此氣數可謂庸常甚矣五星聚于宫者如火水木土金聚于一位其間雖欠一兩座者無木有氣謂代曜無水有孛亦可謂代曜者亦皆大貴日喜奎星月忻婁畢羅翼計軫孛柳氣牛此格非常増福倍萬專星獨照更須㸔樂旺忌囚衆曜俱照亦當論福禄刑暗火遇氣而官髙木㑹孛而爵厚孛星入命必主背離月曜居奴端然勞碌身在遷移須出祖疾遭刑尅必傷身土羅主酷暴威權木氣有柔和氣象財田倘逢的煞破蕩生涯安命若遇貴勲優㳺計業貴莫貴乎官煞猶要財奴強星富莫富於田宅更防貌疾惡曜身命空而官禄聚公門胥吏田財襍而本末強躔市藝人犯法囚徒多同師座蘭臺清要過似空門東之星早年發達西之曜暮歲榮華命陷身空必多不利日土夜火應發可期陷莫陷於兄奴髙莫髙於官命土留蹇滯木逆災凶得子而早傷者計羅月孛娶妻而貌美者金水氣星鎮多守土之臣日有大君之象大富可以折小富夭折可以當孤貧紫氣廣博多才月孛機謀惹謗火主禮而執法金好義而輕財木性仁火性信金性義水性智此不易之論也火為執法之星所以主禮而執法金性主義見之者多有義氣義不主財故謂輕財計見土執而又執水逢孛淫而更淫非羅不成大名非氣不享清福土性凝滯若更加之以計執而又執者也水性淫蕩若更加之以孛則愈淫矣日居月殿則君降臣位月在日宫則臣干君政金月至畢而有助火土到牛而樂逢金水逢軫氣木㑹奎太乙捧月於秦鬼廷尉逢陽於齊虚遇之者髙品殊勛逢之者三台宰輔月歸於未及臨奎戌巳自明徤更得孛之相助莫不大貴廷尉水星也水於子謂之水清寳瓶更輔日於虛殿極品貴格也然究五星之奚若始可發言次㸔二限為何如方宜敢斷且如五星怒逆二曜受傷須審經緯後先有救皆吉無助則凶譬如土埋雙女見氣非凶木打寳瓶遇羅則吉水化伏尸見太陽而無咎火燒牛角遇土德以長年金騎人馬水㑹尤佳若木危金箕水奎火畢土躔翼而最妙木躔張而反吉此乃反凶作吉變禍為祥理有優長之論心宜静慮而推一不可拘二須敢斷最𦂳者生尅制化最妙者殿駕勛垣逢尅制者非夭則貧遇生化者不富則貴次觀星辰之順留伏逆時令之春夏秋冬釣起飛填横衝直撞前後引從左右提挈當究君臣之象宜觀賓主之星詳孰是而孰非考何得而何失星行順軌逢尅制而必傷位在髙強既失經而何益謂如春木夏火秋金冬水此是令星非惟主曜天有二十八宿而可測地有一十二宫之可究七政四餘經度以準乎天七強五弱照臨而應乎象惟有土旺四季各有一十八日星布一年每年七十二候分隂陽之氣序定日月之循環測晨昏而分晝夜認賓主而辨君臣本或有差末將何補
