body:
  text: 提要星命總括三卷術數類五命書相書之屬臣等謹案星命總括三卷舊本題遼耶律純撰有純原序一篇末署統和二年八月十三日自稱為翰林學士奉使髙麗議地界因得彼國國師傳授星躔之學云云按統和為遼聖宗年號遼史本紀其年無遣使髙麗事其二國外紀但稱統和三年詔東征髙麗以遼澤沮洳罷師亦無遣使議地界之文遼代貴仕不出耶律氏蕭氏二族而遍檢列傳獨無純名殆亦出于依托也文淵閣書目載有是書一部不著册數菉竹堂書目作五册又不著卷數外間别無傳本惟永樂大典所載始末完具然計其篇頁不足五册之數或葉盛所記有訛歟中間論議精到剖析義理往往造微為術家所宜𠫭考惟所稱宫有偏正則立説甚新而驗之殊多乖忤蓋天道甚逺非人所能盡測故言命者但當得其大要而止茍多出竒思曲意揣度以冀無所不合反至于窒塞而不可通矣術家流弊往往坐此讀者取其所長而略其繁瑣可也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序大遼統和二年翰林學士耶律純以議地界事奉國書使於髙麗遼東至其國頗聞國師精於星躔之學具重幣設威儀求見屢請不從一日自請於髙麗國王曰臣奉國書來此稔聞國師富於道德星命之學願借玉音得遂一見以請所學何啻昌黎之遇大顛也國王遂命一見既見之後往復數回前請曰微生跧伏北方聞國師深於星命之度今日天幸得瞻毫相願北面從師聞以一二以聳北方之學者亦是三生夙昔之幸不知可乎國師曰何不可之有但學士平生論學有何所得吾與學士從長商榷而已何以師為曰膚學得於生尅制化之外亦有十條前有六條看根本後四條看流年其一曰太嵗尊神加臨管攝其二曰無中有曜弱處髙強其三曰得經失次細辨盈虛其四曰身傍母吉傍鬼者凶其五曰同宫千里異宫尺寸其六曰黨母福多藏鬼禍大其七曰元守雖詳流年猶急其八曰當生變曜流年變星其九曰限並諸煞貴祿不臨其十曰流年諸星無忽柔曜此十條者各有詳注未審如何國師曰十條之説抑末矣本之則無今學士談星根本以宫主為重耶度主為重耶曰得於平昔之講明以宫度兼論不可用一而廢一也國師笑曰宫度兼論吾恐子於星度胸中不能自斷何以斷人之禍福也且如命躔丑宫之牛度宫土度金限行遇火一生一尅何以為斷又如命坐寅宫尾火度木宫大限行遇水一生一尅何以為斷於禍福何慿遂再進曰願棄所學而從師求教師曰吾嘗以近世談星者言宫不知度言度不知宫二者胥失矣吾於海上異人授我以偏正之垣於二十八宿之中分之曰一太陽五太隂六木六土六水二火二金之説學士曾聞之乎曰未也國師曰人生於地日月五行見於天其生值此七曜之吉則一生享福安榮遇七曜之凶則一生迫忙百不如意日月五星其為物也於天地間最大於天下萬物日主晝月主夜乃天之眼目也在天有五星在地有五行人生在世五者一日不可缺觀星談命苟不知此根本則為徒然徒學宫度兼論之術何以決人之禍福故十二宫有偏正之垣子宫以虛日鼠為正垣鼠乃子垣之宫神非正垣而何也丑宫牛金牛寅宫尾火虎卯宫房日兔辰宫亢金龍巳宫翼火蛇午宫星日馬未宫鬼金羊申宫觜火猴酉宫昴日雞戌宫婁金狗亥宫室火豬皆本宫之正垣此為千古不易之論此談星之大根本可不盡知要妙哉所謂一太陽者太陽君象天無二日民無二主惟星日馬乃太陽之正垣五太隂者后妃之象后妃嬪衆多宜太隂之五也故以鬼金羊為太隂之正垣其餘張心危畢月皆偏垣之月也六木者寅宫尾火虎亥宫室火豬為木正垣其餘斗奎井角皆偏垣之木也六土者子宫虛日丑宫牛金為土正垣其餘女氐胃栁皆偏垣也六水者巳宫翼火申宫觜火為水之正垣也其餘箕壁參軫水皆偏垣也二火者卯宫房日戌宫婁金為火之正垣二金者辰宫亢金酉宫昴日為金之正垣天地之間水木土隨寓而有隨所居而可得木滿山林土滿寰宇水滿江河隨處皆有至於金火則不可多得焉只有二火二金使金火如木水土之多則天下嘗有持刃縱火之患耳豈不為世道憂吾有偏正垣七政論並日月並明説計八篇又有二百字真經二十五題詳於學士十條者學士所舉十條人常聞常知也吾之諸論其金火者人所未聞未知也今以授子子欲行之當誓於天地鬼神不可輕泄此天機玄妙吾得海上異人所傳而未嘗泄今子得吾之所傳若不寶而重之必招譴於天不可逃也乃對師焚香設誓三日後國師遂以諸論八篇與夫二百字真經二十五題授之百拜而寶之大遼統和二年八月十三日耶律純自識
