body:
  text: 星命總括卷上遼耶律純撰二十八條斷例四正宫神互相管攝四正者如日之虛房星昴木之角斗井奎之數互相管攝凡看星辰先看主星落何方有何生尅制化若論凶吉合依星辰而斷同宫千里異宫寸尺且如子上立命女虛危雖是同垣何止千里若危十一危十二立命亥上危十三十四有尺寸之隔此何可以異宫論也他倣此二母爭權姑恤大過如木命見水孛或臨本宫三合獨見方為福若同見二母爭權反為禍餘倣此一星得地初無二用或土宫立命或命主土星在别處三合見火生土吉設若三合火見金火性炎上便去尅金却不能生土餘倣此水火相戰其勢俱敗如水命火同在命或三合或十五度之內相照雖火受水尅我亦不寧其勢俱敗餘倣此日月爭權到底無光如日為命主夜生本無光或與月同宫或見三合月為命主晝生本無光與日同宫或合照是自爭權無成於福氣祿嫌衝破衣食艱難如甲生人祿在寅立命在申祿當頭為命衝破終是艱難奔走限逢之亦然餘倣此馬忌空亡衣食奔波如己巳生人馬在亥行限至此或命身值此更加以凶星守照畢生受困餘倣此母主無權者福氣不大如命在子土為主限行遇火或三合為水孛所傷其母受尅子必無力福氣不大他倣此向前得力令後無功如命在亥木為主行子限三合見一水單行必巳發福若又行限到辰再見水孛必無再發之理若是無形終難有力五星乃有形餘氣無形五星相尅此理甚明如氣近土孛近火乃餘氣侵克其力終緩或戌上立命命主火星在子金水同宫辰上雖有氣亦難制水尅火之虐况子宫水旺之地其火受尅不淺以此合言天命他倣此黨惡則亂制惡不行如木命行限遇金本自受尅加土計臨三合助威為殺愈重若同火羅則制其金惡不行矣獨陽不生孤隂不生若男人命遇太陽居四正為得地左右無吉星三合又無助為獨陽不生女命遇太隂居七强亦得經入廟三合皆無吉助為獨隂不生為事多尅無成男命看四正女命看七强刑囚入陷縱惡難施如甲生人命在戌火為主水化刑本能尅我三合有土計制之或入陷地彼受制之不暇豈能施惡於我哉或土計自陷又恐不能制水暗耗雖强逢生反益如甲生人命在酉金耗為主限逢土計不以為耗又如乙生人命在亥木為主化暗得宫有水孛生之其暗反明四正日月最怕西沉如子午卯酉四正之地為日月之垣獨酉為西沉之地若日月居其上終無顯逹三方祿馬最宜拱照如乙生巳酉丑之人命在未馬在亥祿在卯三合拱照一生衣祿不少此論地元祿馬安身傍母福祿尤佳如土為命主火為土母月火同宫不以傷身論又如命在辰金為主土為母月與土同行不以蝕月論乃富貴格局奴賊臨身妻兒必尅如寅亥木為主氣為奴星若氣與月同行或傍其人必孤又如子丑土為主計為奴若計與月同行或傍其人必受刑傷不然天餘倣此主數遇陷有救不凶如木命人木陷於子或入金宫化刑囚或值命限到此本受尅緣三合有水孛能解金厄轉凶作吉但未免勞心耳母若當權為福莫大如土命子上立命以寅卯為隱官之地若有一火羅獨守在上是母當權大吉餘倣此同室操戈必招禍變如立命在子不問主星但有水火同垣金木同位雖彼自相戰尅與命宫不相干終是窘我室廬禍起蕭牆之內也飛星破駕終是廢人凡論命必殿駕為先假如甲辰生嵗駕在辰金為駕主辰酉立命金為命主若有火羅飛入辰宫乃為害曜破駕必賤人也餘倣此劫殺抗衝威烈以怒如壬子生人命在巳乃的殺之地更有刑土之星於其上是謂殺見殺行限必夭三元並駕祿又加官如甲子生人祿馬俱在寅甲生人又以木為天元是木為三元若臨身命必顯逹最是子丑午未命凶相順相生當觀向背如立命戌主入丑宫躔斗九度又有木躔斗焉按此下似缺數條無他本可校夫金生夏而旺於秋水生秋而旺於冬木生冬而旺於春火生春而旺於夏土乘火氣初生旺於已每於四季節中氣前三日為旺其日在辰戌丑未為正位故金旺木死木旺金囚水旺木相土旺火休生我者父母我生者子孫尅我者官鬼我尅者妻財比和者同類然五行之性各致其用是以元星入局福夀無虧母曜歸巢榮華有凖若見財星得所發積成家倘或刑星當前尅傷喪命遇子旺宫多顯發子衝殺處必英雄子可順於財星財莫傷於母曜興財享福印綬滋元反禍為祥兒鄉制鬼刑星有制故逢我勝他衰元若居財切忌財星受死本宫正旺母受刑生榮有日元如虛弱元逢子怯發無因清淡守虛子居母局性貪薄藝母入財鄉元局故怕受傷元星亦嫌受尅元居鬼局破耗非輕子入元方艱辛萬狀謀他失本生局逢財好事多磨妻宫制母元莫傷於財曜子可逺於母星衝鬼須當子在先援母必當鬼在後為禍者須逢死絶為福者切忌休囚妻來入母父道先亡母若俱生坤宫早逝伏吟庶出母入兒胎衾枕孤單妻居夀局尅傷離祖鬼局逢刑被害傷身妻宫逢鬼母入刑宫情斷絶子居鬼煞繼無親子居鬼局尤逢死絶之鄉妻入妻宫切忌休囚之候妻居制局怙恃乖離子入夀鄉女男多獲子星入制寄飬偏生妻曜居生因妻家敗母居夀局棣蕚聫芳鬼入元宫雁行分序夀入夀無傷則男女成行財遇財有尅則夫妻反目兒鄉有尅當尋妻曜長生妻局受傷須看子星帝旺母星入制孤尅散離夀曜居財慳貪喪失五行相尅便知先者受傷兩曜相生必是後來泄氣先詳體用次察尊卑一舉才通萬無一失星經凡論星不論元官食合不識變通造化元者天干之元也如甲人木為天元火為祿主官者甲用辛為官以金為官主以氣為官祿主食者甲食丙以木食祿主合者甲合巳以太隂合祿主餘倣此若此四星髙强得時一生食祿享用矣以官魁祿馬定人之前程官者以甲用辛官以金官次以官祿宫主魁者甲用羅乙用計之例祿者甲祿在寅以木祿元馬者如寅午戌馬在申以水馬元此四星髙强得時得地者貴矣最喜者四角之有星所忌者三空之無曜四角者寅申巳亥是也吉星臨之必有權柄之福三空者三合也三合中無星曜當為僧道之命孤尅矣驛馬臨官出祖成家如申子辰馬在寅命在亥宫上官祿在寅必主出祖成家外發矣祿入妻宫因妻致富如甲生人命坐申宫祿在寅乃祿入妻宫也木更為佳男命若直子午强狠専權子午乃天地之中氣稟氣不薄男命得此専豪傑也女命若立巽乾淫冶誇色巳為登明亥為天乙女命坐於此上自誇逞色好淫坐貴不宜衝貴如命坐亥壬癸生人貴在巳為衝破一生近貴不得力見合不宜見淫合者隂陽之偶也若逢水孛爭寵嵗君與合限亦然女人最忌立身合論馬元失管則徒奔走人命坐馬上或有文星或逢官祿主星或貴元星坐其上如人之管馬不致奔走若使其上無一星守照别無人所管也必致奔走矣聚財則觀庫位無守必能敗亡財庫者如金庫在丑木庫在未之例受制及無星照管必易敗矣不宜輕用間奴此等須還我用若弟兄主奴僕主來爭破我財庫反為他所有我將何用焉先賢曰善用星則易祿不宜破破則貧窮如甲祿在寅申為破祿若還衝破則食祿被傷煞不宜真真難磨滅如申子辰人煞在巳卯上安命乃真煞也若更當令定凶孤而帶寡妻子難為如寅卯辰生人以丑為寡以巳為孤男忌孤女怕寡空加以亡名利不遂以陽為空隂為亡甲子生人見亥乙丑生人見戌此真空亡陽怕隂隂怕陽犯此焉能利名哉刑不宜戰戰則必刑三刑帶煞必然刑害合不宜衝衝則必破合還衝破作事無成論刑必論煞刑煞重而煞難當如申生人寅上安命寅刑巳之申是犯三刑巳為劫煞的煞之地限到此何以當之如更金星當令居之凶矣論官必論魁官魁顯而官清貴如甲生人以辛為官以金為官星以羅為魁逄生旺當時可居官享福矣既參官星夲宿當以太陽而相參官星又是官祿之主緣何以太陽而相參蓋天盤午宫以日為官星以此參之須論刑煞星辰合以天煞而互論日月並明論日之與月其次舍在天相近故在子午卯酉四正子為帝座午為端門卯為明堂皆日月所居酉為西沒之所人生身命在此皆富貴之人安命在午日在巳月在未為隂陽夾命日月在男女遷移夾拱有力必有權柄日午月子日邜月酉皆貴命日子月午月卯日酉皆賤命也日居月度月居日度亦反背也其人必庶生二母日生忌火夜生忌土亦當以標本論詩曰十二宫中不言主强云晝忌火夜忌土何以不忌水木金是致五星皆莽鹵行限若是見日月妙不可言或限中日月夾拱皆致福火羅犯日土計犯月皆損害六親朔日蝕望月蝕皆在日月度不夭即盲啞之人日月同在命宫其人多貴巳為陽極月不宜居亥為隂極日不宜居月巳妨母日亥妨父日月拱命拱二主皆貴拱田財必內發拱遷移必外發拱妻子必得賢妻子力拱疾厄必少疾病以類言之百無一失日為主躔木度月為主躔土度皆失也日月二曜乃君后也初不為害於人而關人之夭夀何歟蓋日月命身之主受傷故也若日月為身命之星當生却被羅計於緊關攔截掩其光彩或關煞來犯或孛火土化惡羅計夾輔穿釣有如此者非特日月受傷而吾之身命亦受傷矣至若太隂為身命中之主尤其緊切蓋月是身若是惡星來釣是攘其所主之主矣豈不為南柯夢中人也太隂論夫命取太陽安命以明其體以太隂為身以明其用命則人所可同身則人所不可同如命宫諸貴富格貧賤格與此身無淺深皆所不論必須與身有干係深重方是太隂九行說月有九行以黃道為經緯之主青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北四時更可隨黃道而變遷春黃道始於東夏黃道始於南秋黃道始於西冬黃道始於北其日又南陸北陸又是隨天道而旋也以九道捷法推之四時太隂所經之度立春木黃道火青道土黑道金赤道水白道立夏火土金水木立秋金水木火土立冬水木火土金以上五行係月所經由之地以此推其黃黑道如太陽則從月火冬則從水論論命以日月為身所係考九道晦明如人身生世而禀賦厚薄隨形所寓而為吉凶黃道內得五星之吉為福氣計孛羅為減力蓋四餘暗道之曜非黃道所可見也見則必掩晦黑道正四餘得志之所又非五星所可從也黃道為人聰明清和粹美春風和氣灑落通變赤道太陽揚輝之所為人多權略任勢敢為青白道多清潔有風節廉操進退以禮大抵青白道為孤髙之所若更命局與當生孤刑煞局無祿貴駕殿者必孤尅更空亡刃碎交橫必是僧道有吉局亦必是艱難中起黃道雖弱亦可為吉但怕黃道遇掩晦是月行於天而片雲蔽之甚巳其昏晦也黑道愚而好自用賤而好自専心髙無實志大無成之人大抵専繫於九道之內次參得何星之用如妻主內助而起亦由內親而成功名田宅主得父母力財得財官主貴更參諸局無失矣假如太隂度婁婁金也當以金星論如金星得垣占髙强有夾拱與祿貴駕殿相係更見土星之吉立命在巳人必大貴如金星失躔為他星所斷或截其脉不與祿貴駕殿相係却與羊刃劫煞相干此又下賤矣如金星失道太隂得夾拱或見黃道所喜之星祿馬殿駕貴人相涉亦為吉命如金在辰升殿當官祿或火在申子辰當令或難值此不可以身主居官斷之蓋受火之欺為令所役為官所驅何福之有若更有土與火之脉相貫穿此又轉凶為吉之道蓋火欲傷金見土則反火生土土又生金矣挽回一團福氣金在土宫却看土是何宫主妻得妻力男則得男力官則貴福則富乃土為持重之星有培植之功為人亦有持久之福若為火所燥無土挽回凶熖為人多受漂忽震蕩之禍得吉猶凶也若金見水却看水是何宫主田妻男吉官福尤髙是身得此福若生無用之星奴僕兄弟無益於我精神氣脉為彼所竊平生為人無力以小失大如金見木為財看是何宫主妻得妻財奴得奴用之類活法推之無不中矣太隂引從夾拱引從夾拱當下孰吉孰凶如月度婁前三十度內有吉星為引後三十度內有吉星為從引以逺者為吉從以近者為是前後夾拱勻停不論何星多寡皆為引從夾拱但看叶和爭鬬如何耳前引後從又要無求太隂之前不以多少近前一星以之為主若前面之星與所主之星與日月有傷此為下賤若日與官祿貴殿駕職元㑹無非富貴前後擁從停勻所主之星與月相得前面諸星相戰爭只要不傷月前主星不礙其為名利若三合釣來亦如此論但當明剖合道望道之說在月前為緊富貴皆獨力為之不藉他人合道望道必因人而成此二項望衢可成功名合衢非仰他人則不可二句未解疑有悮字貴格亦是䕃官拱夾中亦有福如夾吉則吉拱凶則凶又在詳推之也太隂犯殿傷宿犯殿者主為下凌恃權而犯殿傷宿者上剛下暴各恃其力如太隂度胃而羅計占昴畢二宿昴畢日月也天之日月人之君后羅計乃黑道旺暴之星犯其日月並前有此凶星安得不凶傷宿者如太隂在胃立命在子丑木星在月前身命皆係乎土木將來傷之退度尤凶主為人獷狠愚執更當羊刃劫煞之類必是凶惡之徒當受刑法否則夭折又有此格而富貴者乃坐祿馬貴垣殿駕廟旺日月聫格有以伏凶星之勢雖犯殿不妨也推者宜加詳審不可以一槩論也太隂讓殿之說讓殿者如人不臨室而逃别處所讓之殿有吉則福有凶則禍如太隂度昴畢二度之間諸星在翼軫之類獨讓張宿在中或月度翼諸星在栁亦是前為緊後為緩當祿貴殿駕為貴富中間更有金水各一星在張宿謂之一星朝后星之留守護垣此至吉也若讓殿有土計羅孛類不謂朝后謂讓殿受坎此凶格也太隂出垣入垣羅計界出太隂若登殿駕祿貴者吉居煞者凶月乃桑星有晦朔弦望全藉諸星輔之日生宜木水氣日夜生宜金孛計火羅在太隂之前後見最怕隂陽反背諸星失志太隂前有吉星相近祿貴後有惡煞趕趂尤吉從卯上起子逆數以丑加寅以寅加丑卯加子辰加亥巳加戌午加酉未加申申加未酉加午戌加巳亥加辰子卯相通丑寅相通辰亥相通巳戌相通午酉相通未申相通如人立命子通關卯若卯宫有祿貴殿駕有火羅命母則一生吉利如通刃劫破碎有木氣鬼星則一生迍蹇學者宜知之限入空關限入空關作神煞星辰遼逺又無情流年衝到招凶煞定作南柯夢裏人限到當生所在煞上無星主事兩旁三合之星亦復遼逺即為空限若火羅計孛持戰於此限之正度即為夢蝶人矣生時限身命二位若值氣木星守之宫主出在間極位故為僧道如更入廟旺及生時在貴科必主為髙上僧如羅獨守主大權夜生土孛尅身後必還俗如犯刑煞主徒流歸俗如有救神即免凶星如忌如奪固凶星也金羅計孛火土化惡亦惡一惡星在後行緊關末關將盡又有一凶星初關緊關方來惡星光芒相射必為薤露人矣又如剛星得田財戰鬬或剛星聚吉戰鬬相尅得氣救解只恐氣之光星一出或忌或奪來迎皆主大憂亦速死無饒矣金星帶煞遇羅星二煞相生奈倒評老幼反常渾不利閻王來詔入蓬瀛金星帶奪於緊關內正度或鋒鋩交承之際或火土二煞星為主限而金孛羅兼老人遇此於生旺少年逢此於死絶此等格局多死金牛靈臺詩限主還元大可愁五星帶奪煞同謀更兼忌曜來助虐此命須登白玉樓倒限之法奪星為第一奪星行限逢氣生起或宫主相生或化惡背時決然倒限火土名忌乃煞星也二星相㑹謂之二煞同謀最為凶害此等格局雖有過北斗之資亦難買無常之厄如忌奪相㑹相尅謂之二煞是反目十度之外相逢不過見災而已雖喪亡亦可救也如行限過之死無疑矣煞星帶刃火土雙星帶刃來那堪垣廟兩和諧流年太嵗來衝倒任是公侯也受災火土二曜乃煞星也况又帶奪其惡尤甚又且得經得垣加之太嵗月將衝動為禍不可勝言限行到此雖有扁鵲之智亦不能救若二星身帶刃破碎的煞决不善終論倒限太嵗為衆煞之主統衆煞行於黑道中所以為災不違時刻看人夀夭窮困終身凶吉婚姻身命宫位日月命主俱落煞鄉更煞神拱夾又占髙强縱或得福皆非長久之道限入煞鄉未免死於非命或吉為凶神所惱凶為吉神所臨刑害可知宜加詳審故有十忌一忌破祿二忌空亡馬三忌太嵗當頭四忌坐煞向煞五忌煞星得志六忌限入鬼鄉七忌粧鬼局八忌二煞夾限九忌命主受制十忌母星尅令立命行限此十忌為凶至慘經云夀元不求定休論處世多屯常冷淡若見當生日月命主俱各受制大限方入煞神之初或出煞神之末不見救星來未有不凶者今分諸煞旺弱為詩二十首於後劫煞元來是煞魁身空命主不須來若為鬼局應當死煞曜臨之不必猜若是無星居此位更於三合細推排天盤加得凶星到命似風燈不久摧要知三煞最為凶直難同臨不善終三合無星更須忌煞星切莫又相逢日月二曜同居此官祿臨之禍愈隆大限相將離煞尾黃泉之下定行蹤煞中羊刃最為凶身命同臨主破刑大限一交當畏懼煞星在上恐難行若無凶曜尤當忌局勢參詳判死生三合更加神煞拱才離羊刃入幽冥皆言七煞是亡神莫道亡神禍患輕身命若還居此地貧窮蹇滯過平生凶星惡曜加臨到大限渾如履薄氷三合更須明審察煞來夾拱更難行已中的煞金生處煞氣嚴凝人畏懼莫教劫煞又同宫便主黃泉尋去路若為水命土星到粧起煞神真局勢世人莫只忌秋生四季生人尤可畏酉中的煞旺中金金氣秋霜煞氣深羊刃若還同到此煞星日月不須臨若非惡氣須言夭大限才交便促行太嵗當頭又衝動此身安有可延生的煞如逢在丑宫煞神歸庫不為凶更加三煞並羊刃限數存亡頃刻中若是亡神煞星到雖煞不死也為凶若為日月三方拱禍患憂危更不同限星不入煞神同日月三方拱更凶兩煞夾之尤可畏天盤加到禍重重午宫坐命尤嫌木亥上還為八煞宫不必木星同到此水星若到亦當終局勢尤當子細推世人不識此天機煞星不到還須忌鬼曜臨之限亦危設若太隂居鬼局才交限局便傾危更加劫煞並羊刃煞在天盤禍不遲星家倒限有真機第一先將煞曜推切莫一途拘泥著須看命主有無虧命星安穩無刑尅此身平善實無疑若為命主遭他害任是神仙也皺眉欲識煞神停力處二煞中同人畏懼更看加合反復宫煞神飛到誠為慮縱然煞星不加臨須忌行年太嵗侵行年煞星照臨著天命傾危不可禁劫煞怕頭三煞尾羊刃兩頭皆要忌羊刃若在相貌宫破相毁形端的是此煞排歸八煞中太隂飛到為凶比羊刃劫煞扶兩旁禍起之時難可避煞若飛廉凶又凶莫安身命在其中欲知鬼局十分重命主隂陽不可逢此煞不須和合看只將地局究其功若還行限臨其地煞曜臨之不善終煞神不可例言凶煞落空亡迥不終日月不臨命不到煞星不在命無凶若還限脫煞神尾必定為災福不隆此是天機真妙處根基淺薄禍無窮煞星難曜分生旺春夏秋冬仔細推若是煞星來秉令也分晝夜論安危若為反背須還忌夀算摧殘禍有基刃煞更臨人畏懼此身安有百年期寅丑二宫中立命隂陽合作難星看夜陽晝月誠為忌煞位相逢限不安若在貴人並祿上也須減力命凋殘若還煞拱凶尤甚限數初交死不難若論閻浮死惡人命身俱各值凶神煞星入命命入煞日月臨之必害身更怕煞神來拱夾刑囚為煞更相侵必然死在刀兵下命似殘花滿地零人行空限無星照限若無星福不生加合通關煞神至煞神在上空難行非惟貧困多凶禍破蕩田財似水傾限度若臨天命絶縱然度得也伶仃煞曜從來怕冷窺飛光落影是先機若還大限行臨此隂府王官立限追餘曜為凶凶更甚度躔黑道禍相隨五星為煞分强弱受制還須見福遲日月同居官祿宫限星入此福偏隆若還入到中間度稱意中亡總是空不必煞星並煞局刑囚為煞更相攻欲尋倒限真奇訣驚倒人間學術翁雜論倒限限度尤防直照臨如限是土度忌見真木加以限主宿弱倒限流年煞星添力亦然三合尤切限度防戰鬪火頭孛尾皆為大災若計孛凶星一迎一送决主倒限本宫三合仔細詳之亦有當生限無星辰被流年凶星尅倒者凶星戰鬪者如火孛水計計孛孛羅等亦倒限人命忌星行限十有九凶日生火夜生土為煞則災重納音逢奪必有重災限行到此更逢為煞必死為主之星不論化氣㑹主之星復論化氣煞星若化吉為禍亦輕若化凶尤緊木星化吉為福大化凶為凶亦屢照命限者主尅至緊聚煞交戰火計金羅孛土同更兼忌奪二星攻假饒得氣中間救光景無從亦主凶火孛計羅皆剛星也若三剛互戰使根基壯亦無益也縱得氣木來救光彩一出不復救解又更詳其命如何以上原本題曰星命總括論身居富貴平生多災身命田宅俱值貴人祿馬宫主星不陷只是疾厄主星與囚星入命故多災或太隂被土所制日被火羅所制必主流刑帶煞如福德宫有廟旺星其人只多災亦不至犯刑不然亦得貴人救也論人有吉慶被生災禍身命宫犯暗刑囚殺雖官祿宫見吉星凡遇吉慶則有凶災如官宫見惡星身命無刑煞又見吉星或居貴人與福德宫宫主在命宫廟旺則無災一書云先貴後賤根基既好但財星失時地而官星限又好至好限必貴也若是官宫來吞本主或凌本主則無官按以上原本題曰星命總括續集
